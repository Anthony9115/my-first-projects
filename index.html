<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager App</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      margin-top: 20px;
      padding: 0;
    }

    li {
      list-style: none;
      background: #1e293b;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .actions button {
      margin-left: 5px;
      background: #334155;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Task Manager</h1>

    <div class="input-box">
      <input id="taskInput" placeholder="Enter a task..." />
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        list.innerHTML += `
          <li>
            <span class="${task.done ? 'done' : ''}">${task.text}</span>
            <div class="actions">
              <button onclick="toggleDone(${index})">✔</button>
              <button onclick="deleteTask(${index})">🗑</button>
            </div>
          </li>
        `;
      });

      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById("taskInput");
      if (input.value.trim() === "") return;

      tasks.push({ text: input.value, done: false });
      input.value = "";
      renderTasks();
    }

    function toggleDone(index) {
      tasks[index].done = !tasks[index].done;
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      renderTasks();
    }

    renderTasks();
  </script>
</body>
</html>
<div class="card">
  <h3>Task Manager App</h3>
  <p>A simple productivity app that allows users to add, complete, and delete tasks. Built using HTML, CSS, and JavaScript with local storage support.</p>
  <a href="task-manager.html">View Project</a>
</div>
