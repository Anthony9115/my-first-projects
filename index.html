<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Portfolio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0b1220;
  color:#e2e8f0;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:#0f172a;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
  z-index:1000;
}

nav h1{ color:#38bdf8; font-size:18px; }
nav a{
  color:#e2e8f0;
  margin-left:15px;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{ color:#38bdf8; }

/* HERO */
header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#0b1220,#1e293b);
}

header h2{
  font-size:40px;
  color:#38bdf8;
}

header p{
  max-width:500px;
  margin-top:10px;
  color:#94a3b8;
}

.btn{
  margin-top:20px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{ transform:scale(1.05); }

/* SECTIONS */
section{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

h3{
  color:#38bdf8;
  margin-bottom:20px;
}

/* SKILLS */
.skills{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.skill{
  background:#1e293b;
  padding:10px;
  text-align:center;
  border-radius:8px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#334155;
}

/* CONTACT */
.contact-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  outline:none;
}

textarea{
  height:120px;
  resize:none;
}

.form-btn{
  margin-top:10px;
  width:100%;
  background:#38bdf8;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.email-btn{
  margin-top:10px;
  width:100%;
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* SUCCESS POPUP */
.popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:black;
  padding:12px 15px;
  border-radius:8px;
  display:none;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#0f172a;
  color:#94a3b8;
}

/* MOBILE */
@media(max-width:768px){
  .contact-box{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<nav>
  <h1>MyPortfolio</h1>
  <div>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<header id="home">
  <h2>Hi, I'm a Developer</h2>
  <p>I build clean, responsive websites while learning full-stack development step by step.</p>
  <button class="btn" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
    Contact Me
  </button>
</header>

<section id="projects">
  <h3>Projects</h3>
  <div class="projects">
    <div class="card">Landing Page</div>
    <div class="card">Portfolio Site</div>
    <div class="card">Calculator App</div>
  </div>
</section>

<section id="contact">
  <h3>Contact Me</h3>

  <div class="contact-box">

    <!-- FORM -->
    <div>
      <input type="text" id="name" placeholder="Your Name" />
      <input type="email" id="email" placeholder="Your Email" />
      <textarea id="message" placeholder="Your Message"></textarea>

      <button class="form-btn" onclick="sendMessage()">Send Message</button>
    </div>

    <!-- EMAIL BUTTON -->
    <div>
      <p style="color:#94a3b8">
        Or contact me directly via email:
      </p>

      <button class="email-btn" onclick="window.location.href='mailto:yourmail@gmail.com?subject=Portfolio Contact&body=Hello, I reached you from your portfolio'">
        Send Email
      </button>
    </div>

  </div>
</section>

<div class="popup" id="popup">Message sent successfully ✅</div>

<footer>
  © 2026 My Portfolio
</footer>

<script>
function sendMessage(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  if(name === "" || email === "" || message === ""){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("popup").style.display = "block";

  setTimeout(()=>{
    document.getElementById("popup").style.display = "none";
  },3000);

  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("message").value = "";
}
</script>

</body>
</html>
